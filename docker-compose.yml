services:
  decidim:
    #image: decidim/decidim:0.31.4
    build: .
    #env_file: 
    #  - .env
    ports:
      - 4000:4000
    volumes:
      - .:/code
      - bundle:/usr/local/bundle
    environment:
      - RAILS_ENV=development
      - DATABASE_HOST=pg
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=
      - DATABASE_NAME=decidim_development
      - PORT=4000
      #- RAILS_DEVELOPMENT_HOSTS=decidim.vps01.chicommons.coop
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY_BASE=changeme_generate_a_secure_key_for_production
      - DECIDIM_SPAM_DETECTION_BACKEND_RESOURCE=redis
      - DECIDIM_SPAM_DETECTION_BACKEND_USER=redis
      - DECIDIM_SPAM_DETECTION_BACKEND_USER_REDIS_URL=redis://redis:6379/3
      - DECIDIM_SPAM_DETECTION_BACKEND_RESOURCE_REDIS_URL=redis://redis:6379/2
      - SMTP_AUTHENTICATION=plain
      - SMTP_STARTTLS_AUTO=true
      - QUEUE_ADAPTER=:delayed_job
      - SMTP_ADDRESS:${SMTP_ADDRESS}
      - SMTP_DOMAIN=${SMTP_DOMAIN}
      SMTP_PORT:${SMTP_PORT}
      SMTP_PASSWORD=${SMTP_PASSSWORD}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}

    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dnetwork
    restart: unless-stopped
    # This command will create and migrate the database automatically on startup
    command: >
       bash -c "
        gem install 'daemons'
        gem install 'delayed_job_active_record'
        gem install 'decidim-demographics' -v '0.31.4'
        gem install 'decidim-ai' -v  '0.31.4'
        gem install 'decidim-collaborative_texts' -v  '0.31.4'
        gem install 'decidim-conferences' -v  '0.31.4'
        gem install 'decidim-design' -v  '0.31.4'
        gem install 'decidim-elections' -v  '0.31.4'
        gem install 'decidim-initiatives' -v  '0.31.4'
        gem install 'decidim-templates' -v  '0.31.4'
        bundle exec rails db:create db:migrate #|| true &&
        #bin/rails db:migrate
        chmod -R 777 /usr/local/bundle
        bundle exec rails s -b 0.0.0.0 -p 4000 
       "
    
  pg:
    image: postgres:17-alpine
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=
      - POSTGRES_DB=decidim_development
      - POSTGRES_HOST_AUTH_METHOD=trust
    networks:
      - dnetwork
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - dnetwork
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg-data: {}
  redis-data: {}
  bundle:
  #node_modules:

networks:
  dnetwork:
    #external: true
